<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Surprise Trip Reveal</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #e8366f;
      --gold: #f5c842;
      --deep: #1a0a2e;
      --coral: #ff6b6b;
      --cream: #fff8f0;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--deep);
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── COVER SCREEN ── */
    #cover {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 60%, #2d0a4e 0%, #1a0a2e 70%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 100;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    #cover.hidden {
      opacity: 0;
      transform: scale(1.08);
      pointer-events: none;
    }

    /* floating stars */
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      opacity: 0;
      animation: twinkle var(--d) ease-in-out infinite;
      animation-delay: var(--delay);
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 0.9; transform: scale(1); }
    }

    .cover-tag {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      font-size: 0.78rem;
      color: var(--gold);
      margin-bottom: 28px;
    }

    .gift-box {
      position: relative;
      width: 160px;
      height: 160px;
      margin-bottom: 36px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-14px); }
    }

    .box-body {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 110px;
      background: linear-gradient(135deg, var(--pink) 0%, #c0205a 100%);
      border-radius: 8px 8px 10px 10px;
      box-shadow: 0 12px 40px rgba(232,54,111,0.45);
    }
    .box-body::after {
      content: '';
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 24px; height: 100%;
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
    }

    .box-lid {
      position: absolute;
      top: 0; left: -8px; right: -8px;
      height: 48px;
      background: linear-gradient(135deg, #f04080 0%, #b01850 100%);
      border-radius: 8px;
      box-shadow: 0 6px 20px rgba(232,54,111,0.35);
      animation: lidBounce 3s ease-in-out infinite;
    }
    @keyframes lidBounce {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-6px) rotate(-2deg); }
    }
    .box-lid::after {
      content: '';
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 24px; height: 100%;
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
    }

    /* bow */
    .bow {
      position: absolute;
      top: -18px; left: 50%; transform: translateX(-50%);
      width: 60px; height: 36px;
    }
    .bow-left, .bow-right {
      position: absolute;
      width: 28px; height: 28px;
      border-radius: 50% 0 50% 50%;
      background: var(--gold);
      top: 0;
    }
    .bow-left  { left: 2px;  transform: rotate(-45deg); }
    .bow-right { right: 2px; transform: rotate(45deg) scaleX(-1); }
    .bow-knot {
      position: absolute;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--gold);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
    }

    .cover-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      color: white;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 12px;
    }
    .cover-title span { color: var(--gold); }

    .cover-sub {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.1em;
      margin-bottom: 40px;
    }

    .click-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--pink), #b01850);
      color: white;
      border: none;
      padding: 16px 38px;
      border-radius: 50px;
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(232,54,111,0.5);
      animation: pulse 2s ease-in-out infinite;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .click-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 12px 40px rgba(232,54,111,0.7);
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 30px rgba(232,54,111,0.5); }
      50%       { box-shadow: 0 8px 50px rgba(232,54,111,0.85); }
    }

    /* ── CONFETTI ── */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 200;
    }

    /* ── REVEAL SCREEN ── */
    #reveal {
      position: fixed;
      inset: 0;
      background: var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      opacity: 0;
      transform: scale(0.94);
      transition: opacity 0.9s 0.3s ease, transform 0.9s 0.3s ease;
      pointer-events: none;
      overflow-y: auto;
    }
    #reveal.visible {
      opacity: 1;
      transform: scale(1);
      pointer-events: all;
    }

    .ribbon {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      font-size: 0.72rem;
      color: var(--pink);
      margin-bottom: 10px;
      opacity: 0;
      transform: translateY(16px);
      transition: all 0.6s 0.9s ease;
    }
    #reveal.visible .ribbon { opacity: 1; transform: translateY(0); }

    .reveal-heading {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 7vw, 4rem);
      font-weight: 900;
      color: var(--deep);
      text-align: center;
      line-height: 1.1;
      margin-bottom: 6px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.7s 1.1s ease;
    }
    #reveal.visible .reveal-heading { opacity: 1; transform: translateY(0); }
    .reveal-heading em { color: var(--pink); font-style: normal; }

    .emoji-row {
      font-size: 2rem;
      margin: 12px 0 20px;
      opacity: 0;
      transform: translateY(16px);
      transition: all 0.6s 1.3s ease;
    }
    #reveal.visible .emoji-row { opacity: 1; transform: translateY(0); }

    .image-wrap {
      position: relative;
      width: min(520px, 92vw);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(26,10,46,0.2);
      opacity: 0;
      transform: translateY(24px) scale(0.97);
      transition: all 0.8s 1.5s ease;
      margin-bottom: 28px;
    }
    #reveal.visible .image-wrap { opacity: 1; transform: translateY(0) scale(1); }

    .image-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }
    /* fallback gradient if image doesn't load */
    .image-wrap .img-fallback {
      width: 100%;
      height: 260px;
      background: linear-gradient(135deg, #ffb347 0%, #ff6b6b 50%, #e8366f 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
    }

    .tagline {
      font-size: 1.05rem;
      color: #555;
      letter-spacing: 0.05em;
      text-align: center;
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.6s 1.9s ease;
      max-width: 420px;
    }
    #reveal.visible .tagline { opacity: 1; transform: translateY(0); }

    .heart-row {
      margin-top: 18px;
      font-size: 1.5rem;
      opacity: 0;
      transition: all 0.6s 2.2s ease;
    }
    #reveal.visible .heart-row { opacity: 1; }
  </style>
</head>
<body>

<!-- ░░░ COVER ░░░ -->
<div id="cover">
  <p class="cover-tag">A very special surprise awaits you</p>

  <div class="gift-box">
    <div class="bow">
      <div class="bow-left"></div>
      <div class="bow-right"></div>
      <div class="bow-knot"></div>
    </div>
    <div class="box-lid"></div>
    <div class="box-body"></div>
  </div>

  <h1 class="cover-title">Happy Birthday,<br><span>are you ready?</span> 🎂</h1>
  <p class="cover-sub">Your surprise is one click away…</p>

  <button class="click-btn" onclick="reveal()">
    🎁 Open Your Surprise
  </button>
</div>

<!-- ░░░ CONFETTI CANVAS ░░░ -->
<canvas id="confetti-canvas"></canvas>

<!-- ░░░ REVEAL ░░░ -->
<div id="reveal">
  <p class="ribbon">✈ Your birthday adventure</p>
  <h2 class="reveal-heading">We're going to<br><em>Bangkok!</em></h2>
  <div class="emoji-row">🌸🛺🍜🌅🐘</div>

  <div class="image-wrap">
    <img src="bangkok.jpg" alt="Bangkok"
         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
    <div class="img-fallback" style="display:none">🏯</div>
  </div>

  <p class="tagline">Get ready for golden temples, night markets, tuk-tuks, and memories you'll never forget.</p>
  <div class="heart-row">💖 💖 💖</div>
</div>

<!-- ░░░ STARS ░░░ -->
<script>
  const cover = document.getElementById('cover');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%; left:${Math.random()*100}%;
      --d:${(Math.random()*2+1).toFixed(1)}s;
      --delay:${(Math.random()*3).toFixed(1)}s;
    `;
    cover.appendChild(s);
  }
</script>

<!-- ░░░ CONFETTI + REVEAL LOGIC ░░░ -->
<script>
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  let pieces = [];
  const COLORS = ['#e8366f','#f5c842','#ff6b6b','#6bcfff','#b967ff','#00e5a0','#ffffff'];

  function spawnConfetti(n = 180) {
    for (let i = 0; i < n; i++) {
      pieces.push({
        x: Math.random() * canvas.width,
        y: -10,
        w: Math.random() * 10 + 5,
        h: Math.random() * 6 + 3,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        vx: (Math.random() - 0.5) * 4,
        vy: Math.random() * 3 + 2,
        angle: Math.random() * Math.PI * 2,
        spin: (Math.random() - 0.5) * 0.15,
        alpha: 1,
      });
    }
  }

  let animating = false;
  function drawConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces = pieces.filter(p => p.alpha > 0.05);
    pieces.forEach(p => {
      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += 0.04; // gravity
      p.angle += p.spin;
      if (p.y > canvas.height * 0.7) p.alpha -= 0.015;

      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    if (pieces.length > 0 || animating) requestAnimationFrame(drawConfetti);
  }

  function reveal() {
    // hide cover
    document.getElementById('cover').classList.add('hidden');

    // show reveal
    setTimeout(() => {
      document.getElementById('reveal').classList.add('visible');
    }, 400);

    // confetti burst
    animating = true;
    spawnConfetti(200);
    setTimeout(() => spawnConfetti(150), 600);
    setTimeout(() => spawnConfetti(100), 1200);
    setTimeout(() => { animating = false; }, 3000);
    drawConfetti();
  }
</script>
</body>
</html>
